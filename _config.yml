# ─────────────────────────────────────────────────────────────
#  EDIT THESE — everything else on the site derives from them.
# ─────────────────────────────────────────────────────────────
url: "https://ankurnapa.github.io"  # GitHub Pages user site
baseurl: ""                          # leave empty for a username.github.io site

title: "Beer, Wine, Whiskey & AI"
tagline: "Beer, wine, whiskey, mead — where drinks meet AI"
description: >-
  Beer, Wine, Whiskey & AI explores where the drinks industry meets
  artificial intelligence — fermentation and distillation forecasting,
  production analytics, AI tasting notes, and the data science behind
  better beer, wine, whiskey, and mead.
lang: "en-US"

author:
  name: "Ankur Napa"                 # display name (shown on posts; E-E-A-T signal)
  bio: "Writing about beer, brewing data, and applied AI."

# ─────────────────────────────────────────────────────────────
#  Plugins — all on the GitHub Pages allow-list (no extra setup).
# ─────────────────────────────────────────────────────────────
plugins:
  - jekyll-seo-tag        # <title>, meta descriptions, OpenGraph/Twitter cards, JSON-LD
  - jekyll-sitemap        # /sitemap.xml

# ─────────────────────────────────────────────────────────────
#  Build / output
# ─────────────────────────────────────────────────────────────
permalink: /:year/:title/
timezone: America/Los_Angeles
future: true            # publish posts dated "today" regardless of build-server time
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# RSS feed is a custom styled template (feed.xml + feed.xsl), not jekyll-feed.

# ─────────────────────────────────────────────────────────────
#  Reader analytics — paste ONE id to turn it on (all optional).
#  Only loads on the live site, never in local preview.
# ─────────────────────────────────────────────────────────────
google_analytics: "G-1ZHW47YJDC"  # → location, time, referrer, behavior
cloudflare_analytics: ""  # beacon token         → privacy-first, no cookie banner
microsoft_clarity: "ww9jrvdoh1"   # → heatmaps + session replay
goatcounter: ""           # e.g. "https://ankurnapa.goatcounter.com/count"

# Default front matter so posts/pages "just work"
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - ONBOARDING.md
  - vendor
