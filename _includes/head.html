<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
<meta name="theme-color" content="#b45309">

<!-- jekyll-seo-tag emits <title>, meta description, canonical URL,
     OpenGraph + Twitter cards, and BlogPosting/WebSite JSON-LD. -->
{% seo %}

<!-- og:image dimensions + type: jekyll-seo-tag omits these, and LinkedIn (plus
     other scrapers) render the large summary card far more reliably when they
     are present. Every share card — per-post and the site default — is a
     1200x630 PNG, so these static values are correct site-wide. -->
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/png">

<link rel="alternate" type="application/rss+xml"
      title="{{ site.title | escape }}"
      href="{{ '/feed.xml' | absolute_url }}">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<!-- GEO: extra structured data (FAQPage) when a page defines it. -->
{% include structured-data.html %}

<!-- Reader analytics (only loads if a provider is set in _config.yml). -->
{% include analytics.html %}
