<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
<meta name="theme-color" content="#b45309">

<!-- jekyll-seo-tag emits <title>, meta description, canonical URL,
     OpenGraph + Twitter cards, and BlogPosting/WebSite JSON-LD. -->
{% seo %}

<link rel="alternate" type="application/rss+xml"
      title="{{ site.title | escape }}"
      href="{{ '/feed.xml' | absolute_url }}">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<!-- GEO: extra structured data (FAQPage) when a page defines it. -->
{% include structured-data.html %}

<!-- Reader analytics (only loads if a provider is set in _config.yml). -->
{% include analytics.html %}
