{%- comment -%}
  Emits FAQPage JSON-LD when a page/post defines a `faq:` list in front matter.
  The same Q&A must also appear in the visible body (search engines require it),
  which the post template renders from the same data.
{%- endcomment -%}
{% if page.faq %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in page.faq %}{
      "@type": "Question",
      "name": {{ item.q | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ item.a | jsonify }}
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}
